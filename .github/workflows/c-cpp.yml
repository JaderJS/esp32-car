name: Build Firmware

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-${{ hashFiles('**/lockfiles') }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade platformio

      - name: Build firmware
        env:
            VERSION: "0.0.${{ github.event.number }}"
        run: pio run

      - name: Build filesystem
        run: pio run -e esp32dev -t buildfs

      - name: Prepare firmware
        run: |
          cp .pio/build/esp32dev/firmware.bin firmware.bin
          cp .pio/build/esp32dev/littlefs.bin littlefs.bin || true

      - name: Deploy latest.bin
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir public
          cp firmware.bin public/latest.bin
          cp littlefs.bin public/littlefs.bin || true

      - name: Publish to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            .pio/build/**/firmware*.bin
            .pio/build/**/littlefs*.bin