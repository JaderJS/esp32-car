<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>WiFi Manager - ESP32</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: 40px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    input,
    button {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      background: #0066ff;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #0052cc;
    }

    h1 {
      text-align: center;
      color: #333;
    }

    .network {
      padding: 10px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }

    .network:hover {
      background: #f5f5f5;
    }

    .status {
      margin-top: 10px;
      font-size: 14px;
      color: #666;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>🔧 WiFi Manager</h1>

    <form action="/save" method="POST">
      <label for="ssid">SSID</label>
      <input type="text" name="ssid" id="ssid" required placeholder="Ex: Minha_rede">

      <label for="pass">Senha</label>
      <input type="password" name="pass" placeholder="Senha da rede">

      <button type="submit">Salvar e Reiniciar</button>
    </form>

    <button onclick="scan()">🔍 Escanear Redes</button>

    <div class="status" id="status"></div>

    <div id="networks"></div>

    <div id="list"></div>
  </div>

  <script>
    let scanning = false;

    async function scan() {
      if (scanning) return;

      scanning = true;

      const listDiv = document.getElementById("list");
      const statusDiv = document.getElementById("status");

      listDiv.innerHTML = "";
      statusDiv.innerHTML = "🔄 Iniciando scan...";

      try {
        const start = await fetch('/scan/start');
        const startData = await start.json();

        if (startData.status === "cooldown") {
          statusDiv.innerHTML = "⏳ Aguarde alguns segundos antes de escanear novamente...";
          scanning = false;
          return;
        }

        let tries = 0;
        const maxTries = 30;

        const poll = async () => {
          try {
            const res = await fetch('/scan/result');
            const data = await res.json();

            if (data.status === "running" || data.status === "started") {
              statusDiv.innerHTML = `🔄 Escaneando... (${tries}/${maxTries})`;
              tries++;

              if (tries >= maxTries) {
                statusDiv.innerHTML = "⏱️ Timeout ao buscar redes";
                scanning = false;
                return;
              }

              setTimeout(poll, 1000);
              return;
            }

            if (data.status === "failed") {
              statusDiv.innerHTML = "❌ Falha ao escanear redes";
              scanning = false;
              return;
            }

            if (Array.isArray(data)) {
              scanning = false;

              if (data.length === 0) {
                statusDiv.innerHTML = "⚠️ Nenhuma rede encontrada";
                listDiv.innerHTML = "<button onclick='scan()'>Tentar novamente</button>";
                return;
              }

              statusDiv.innerHTML = `✅ ${data.length} redes encontradas`;

              data.sort((a, b) => b.rssi - a.rssi);

              let html = "";
              data.forEach(n => {
                const ssidSafe = (n.ssid || "").replace(/'/g, "\\'");
                html += `
                  <div class="network" onclick="selectSSID('${ssidSafe}')">
                    📶 <strong>${n.ssid || "(oculto)"}</strong>
                    <span style="float:right">(${n.rssi} dBm)</span>
                  </div>`;
              });

              listDiv.innerHTML = html;
            }

          } catch (err) {
            console.error(err);
            statusDiv.innerHTML = "❌ Erro ao consultar resultado";
            scanning = false;
          }
        };

        setTimeout(poll, 1000);

      } catch (err) {
        console.error(err);
        statusDiv.innerHTML = "❌ Erro ao iniciar scan";
        scanning = false;
      }
    }

    async function loadNetworks() {
      const res = await fetch('/api/networks');
      const data = await res.json();
      let html = '';
      data.forEach(n => {
        html += `<div class="network">
          <strong>${n.ssid}</strong> (prioridade ${n.priority})
          <button class="delete" onclick="deleteNetwork('${n.ssid}')">Remover</button>
        </div>`;
      });
      document.getElementById('networks').innerHTML = html || '<p>Nenhuma rede salva</p>';
    }

    window.onload = loadNetworks;

    function selectSSID(ssid) {
      document.getElementById("ssid").value = ssid;
    }
  </script>
</body>

</html>
